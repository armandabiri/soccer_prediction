# ---------------------------------------------------------------------------
# displayed vs ask
# ---------------------------------------------------------------------------
# The percentage the app SHOWS is not the price you PAY. Two payout quotes pin
# the real ask down:
#   Argentina 3-0 (0-3): $20 stake -> $645 payout => ask = 20/645  = 3.10%
#                                                     (displayed 2%,  +1.10pp)
#   Draw 3-3      (3-3): $100      -> $4,879      => ask = 100/4879 = 2.05%
#                                                     (displayed 1%,  +1.05pp)
# Both agree on a ~+1.1pp spread over the displayed number. `displayed` keeps
# the screenshot value; `ask` is what actually leaves your pocket and is what
# the optimizer prices against. Where no payout quote exists, ask is estimated
# as displayed + _ASK_SPREAD (see score_optimizer.ASK_SPREAD) rather than
# trusting the optimistic displayed figure.
#
#   displayed   = market % shown in the app
#   ask         = real price paid per $1 contract (null => derive from spread)
#   probability = model probability for that exact score
#
# Nothing here is ever zero, and the scores listed do NOT cover the whole
# outcome space: every unlisted score (4-0, 5-2, ...) is folded into a single
# untradeable residual outcome by the optimizer, so the tail can never be
# silently treated as impossible.
